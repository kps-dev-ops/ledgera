version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledgera
      POSTGRES_USER: ledgera
      POSTGRES_PASSWORD: ledgera
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgera"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: dev-docker-insecure-key
      DATABASE_URL: postgres://ledgera:ledgera@db:5432/ledgera
      DB_HOST: db
      DB_NAME: ledgera
      DB_USER: ledgera
      DB_PASSWORD: ledgera
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ..:/app

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A config worker -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: dev-docker-insecure-key
      DATABASE_URL: postgres://ledgera:ledgera@db:5432/ledgera
      DB_HOST: db
      DB_NAME: ledgera
      DB_USER: ledgera
      DB_PASSWORD: ledgera
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ..:/app

volumes:
  postgres_data:
