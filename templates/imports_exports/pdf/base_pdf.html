<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Document{% endblock %}</title>
</head>
<body>
    <h1 class="doc-title">{% block doc_title %}Document Ledgera{% endblock %}</h1>

</body>
</html>
