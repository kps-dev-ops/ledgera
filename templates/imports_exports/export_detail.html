{% extends "base.html" %}

{% block title %}Export #{{ job.pk }}{% endblock %}

{% block content %}
<h1 class="text-2xl font-semibold mb-4">Export #{{ job.pk }} — {{ job.get_type_export_display }}</h1>

<div id="status-block"
     hx-get="{% url 'imports_exports:export_status' job.pk %}"
     hx-trigger="every 2s"
     hx-swap="outerHTML">
    {% include "imports_exports/_export_status.html" %}
</div>

<details class="mt-4">
    <summary class="cursor-pointer text-sm opacity-70">Paramètres</summary>
    <pre class="text-xs bg-base-200 p-2 rounded mt-2">{{ job.parametres }}</pre>
</details>
{% endblock %}
