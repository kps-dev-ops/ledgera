{% comment %}
Rend les champs des formulaires allauth (connexion, inscription, mot de passe,
vérification e-mail, 2FA) avec le même gabarit daisyUI que les écrans métier.

Sans ce fichier, allauth utilise `form.as_p` : des <p><label><input> sans style.

On passe par `ui/formulaire.html` — et non par crispy-tailwind — parce que Tailwind
ne scanne que `templates/` et `apps/` : les classes écrites par un paquet installé
dans site-packages sont purgées du CSS compilé.
{% endcomment %}
{% include "ui/formulaire.html" with form=attrs.form %}
