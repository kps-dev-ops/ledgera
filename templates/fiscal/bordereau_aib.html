<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<style>
  body { font-family: sans-serif; font-size: 12px; } h1 { font-size: 18px; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  td, th { border: 1px solid #ccc; padding: 6px 8px; } th { background: #f0f3f7; text-align: left; }
  .num { text-align: right; } .total { font-weight: bold; }
</style></head><body>
  <h1>Bordereau AIB — Acompte sur Impôts sur Bénéfice</h1>
  <p>{{ declaration.configuration.libelle }} — Période {{ declaration.periode_num }}/{{ declaration.annee }}</p>
  <table>
    <tr><th>Base imposable</th><td class="num">{{ declaration.base_imposable }}</td></tr>
    <tr><th>Taux</th><td class="num">{{ declaration.configuration.taux }} %</td></tr>
    <tr class="total"><th>Montant AIB</th><td class="num">{{ declaration.montant_aib }}</td></tr>
  </table>
</body></html>
