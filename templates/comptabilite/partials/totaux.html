{% load humanize %}
<div id="totaux" class="flex gap-4 items-center">
    <div class="stat py-2">
        <div class="stat-title text-xs">Total débit</div>
        <div class="stat-value text-base font-mono tabular-nums">{{ total_debit }}</div>
    </div>
    <div class="stat py-2">
        <div class="stat-title text-xs">Total crédit</div>
        <div class="stat-value text-base font-mono tabular-nums">{{ total_credit }}</div>
    </div>
    {% if equilibre %}
        <span class="badge badge-success badge-lg">Équilibrée</span>
    {% else %}
        <span class="badge badge-error badge-lg">Déséquilibrée</span>
    {% endif %}
</div>
